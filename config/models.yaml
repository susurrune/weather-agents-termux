# Weather Agents — Model Catalog
# Each agent can use a different model. Configure via `wa config set model.<agent> <model>`
# Each model supports optional fallback chain and cost estimates.

openai:
  gpt-4o:
    provider: "openai"
    context_window: 128000
    max_output: 16384
    input_cost_per_1k: 0.00250
    output_cost_per_1k: 0.01000
  gpt-4o-mini:
    provider: "openai"
    context_window: 128000
    max_output: 16384
    input_cost_per_1k: 0.00015
    output_cost_per_1k: 0.00060
  gpt-4.1:
    provider: "openai"
    context_window: 1047576
    max_output: 32768
    input_cost_per_1k: 0.00200
    output_cost_per_1k: 0.00800
  gpt-4.1-mini:
    provider: "openai"
    context_window: 1047576
    max_output: 32768
    input_cost_per_1k: 0.00040
    output_cost_per_1k: 0.00160
  gpt-4.1-nano:
    provider: "openai"
    context_window: 1047576
    max_output: 32768
    input_cost_per_1k: 0.00010
    output_cost_per_1k: 0.00040

