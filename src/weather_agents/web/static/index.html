<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Agents</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1419; --surface: #1a1f2e; --surface2: #242b3d;
  --border: #2a3344; --text: #e2e8f0; --text-dim: #7f8ea3;
  --accent: #38bdf8; --accent-dim: #1e6f9e; --green: #4ade80;
  --red: #fb7185; --yellow: #fbbf24; --radius: 10px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
a { color: var(--accent); text-decoration: none; }

.sidebar {
  width: 240px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
.sidebar-header small { color: var(--text-dim); font-size: 12px; }
.sidebar-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex;
  align-items: center; gap: 8px; font-size: 14px; color: var(--text-dim);
  transition: all .15s; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--surface2); color: var(--accent); }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.agent-bar {
  display: flex; gap: 8px; padding: 12px 20px;
  border-bottom: 1px solid var(--border); overflow-x: auto;
  background: var(--surface);
}
.agent-btn {
  padding: 6px 14px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); font-size: 13px;
  transition: all .15s; white-space: nowrap;
}
.agent-btn:hover { border-color: var(--accent); color: var(--text); }
.agent-btn.active { background: var(--accent-dim); border-color: var(--accent); color: white; }

.chat-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg {
  max-width: 80%; padding: 12px 16px; border-radius: var(--radius);
  line-height: 1.6; font-size: 14px; animation: fadeIn .2s;
}
.msg.user { align-self: flex-end; background: var(--accent-dim); color: white; }
.msg.assistant { align-self: flex-start; background: var(--surface2); }
.msg.system { align-self: center; background: transparent; color: var(--text-dim); font-size: 12px; font-style: italic; }
.msg .sender { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--accent); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.input-bar {
  display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border);
  background: var(--surface);
}
.input-bar input {
  flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 14px; outline: none;
}
.input-bar input:focus { border-color: var(--accent); }
.input-bar button {
  padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
  background: var(--accent); color: white; font-size: 14px; font-weight: 600;
  transition: opacity .15s;
}
.input-bar button:hover { opacity: .85; }
.input-bar button:disabled { opacity: .4; cursor: not-allowed; }

.panel { display: none; flex: 1; }
.panel.active { display: flex; flex-direction: column; }

.status-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; padding: 20px;
}
.status-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.status-card h3 { font-size: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.status-card .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.status-card .label { color: var(--text-dim); }
.status-card .highlight { color: var(--green); font-weight: 600; }

.skills-list { padding: 20px; display: flex; flex-direction: column; gap: 8px; max-width: 600px; }
.skill-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.skill-item .info { flex: 1; }
.skill-item .name { font-size: 14px; font-weight: 600; }
.skill-item .desc { font-size: 12px; color: var(--text-dim); }
.toggle {
  width: 40px; height: 22px; border-radius: 11px; cursor: pointer; border: none;
  background: var(--border); position: relative; transition: background .2s; flex-shrink: 0;
}
.toggle.active { background: var(--accent); }
.toggle::after {
  content: ''; width: 18px; height: 18px; border-radius: 50%; background: white;
  position: absolute; top: 2px; left: 2px; transition: transform .2s;
}
.toggle.active::after { transform: translateX(18px); }

.config-form { padding: 20px; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
.config-form label { font-size: 13px; color: var(--text-dim); }
.config-form input, .config-form select {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 13px; outline: none;
}
.config-form input:focus { border-color: var(--accent); }

.debug-panel { padding: 20px; }
.debug-panel pre {
  background: #0005; padding: 16px; border-radius: var(--radius);
  overflow: auto; font-size: 12px; max-height: 60vh; line-height: 1.5;
}
.text-dim { color: var(--text-dim); }
.text-sm { font-size: 13px; }
.p-4 { padding: 20px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .msg { max-width: 92%; }
  .status-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-header">
    <h1>🌤️ Agents</h1>
    <small>多智能体协作系统</small>
  </div>
  <div class="sidebar-nav">
    <button class="nav-item active" data-panel="chat" onclick="switchPanel('chat')">💬 对话</button>
    <button class="nav-item" data-panel="status" onclick="switchPanel('status')">📊 状态</button>
    <button class="nav-item" data-panel="skills" onclick="switchPanel('skills')">⚡ 技能</button>
    <button class="nav-item" data-panel="config" onclick="switchPanel('config')">⚙️ 配置</button>
    <button class="nav-item" data-panel="debug" onclick="switchPanel('debug')">🔍 日志</button>
  </div>
</nav>

<div class="main">

<div class="agent-bar" id="agentBar"></div>

<div class="panel active" id="panel-chat">
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<div class="panel" id="panel-status">
  <div class="status-grid" id="statusGrid"></div>
</div>

<div class="panel" id="panel-skills">
  <div class="p-4">
    <p class="text-dim text-sm">每个 Agent 拥有 3 个专属技能，可动态激活。</p>
  </div>
  <div class="skills-list" id="skillsList"></div>
</div>

<div class="panel" id="panel-config">
  <div class="config-form">
    <label>默认模型</label>
    <input id="cfgDefaultModel" placeholder="gpt-4o-mini" readonly style="opacity:.6">
    <label>Temperature</label>
    <input id="cfgTemperature" type="number" step="0.1" min="0" max="2" placeholder="0.7" readonly style="opacity:.6">
    <label>Max Tokens</label>
    <input id="cfgMaxTokens" type="number" placeholder="4096" readonly style="opacity:.6">
    <label>Timeout (秒)</label>
    <input id="cfgTimeout" type="number" placeholder="120" readonly style="opacity:.6">
    <p class="text-dim text-sm">配置修改请使用 CLI: <code>wa config set &lt;key&gt; &lt;value&gt;</code></p>
  </div>
</div>

<div class="panel" id="panel-debug">
  <div class="debug-panel">
    <pre id="debugLog">等待连接...</pre>
  </div>
</div>

</div>

<script>
const STATE = { agents: {}, currentAgent: 'fog', ws: null, sessionId: null, connecting: false };

function connectWS() {
  if (STATE.connecting) return;
  STATE.connecting = true;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { debug('WebSocket 已连接'); };
  ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch (err) { debug('解析错误: ' + err.message); } };
  ws.onclose = () => { debug('WebSocket 已断开，5秒后重连'); STATE.connecting = false; STATE.ws = null; setTimeout(connectWS, 5000); };
  ws.onerror = () => ws.close();
  STATE.ws = ws;
}

function sendWS(msg) { if (STATE.ws && STATE.ws.readyState === WebSocket.OPEN) STATE.ws.send(JSON.stringify(msg)); }

function handleMessage(msg) {
  switch (msg.type) {
    case 'session_ready':
      STATE.sessionId = msg.session_id; STATE.agents = {};
      for (const a of msg.agents) STATE.agents[a.name] = a;
      renderAgentBar(); renderStatus(); renderSkills();
      debug('会话就绪: ' + msg.session_id);
      addSystemMsg('会话已建立');
      break;
    case 'chat_chunk':
      if (msg.done) {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('chatInput').disabled = false;
        document.getElementById('chatInput').focus();
      } else { appendStreamChunk(msg.chunk); }
      break;
    case 'state_change':
      if (STATE.agents[msg.agent]) { STATE.agents[msg.agent].state = msg.state; renderStatus(); renderAgentBar(); }
      break;
    case 'task_plan': showTaskPlan(msg.goal, msg.tasks); break;
    case 'error': addSystemMsg('❌ ' + msg.message); break;
    case 'pong': break;
  }
}

function renderAgentBar() {
  document.getElementById('agentBar').innerHTML = Object.values(STATE.agents).map(a =>
    `<button class="agent-btn ${a.name === STATE.currentAgent ? 'active' : ''}" onclick="switchAgent('${a.name}')">
      ${a.emoji} ${a.display_name} <span style="font-size:11px;color:var(--text-dim)">${a.state}</span></button>`
  ).join('');
}

function switchAgent(name) { STATE.currentAgent = name; renderAgentBar(); document.getElementById('messages').innerHTML = ''; }

function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  streamMsgEl = null;
  addMessage('user', msg, STATE.agents[STATE.currentAgent]?.emoji || '');
  document.getElementById('sendBtn').disabled = true;
  input.disabled = true;
  sendWS({ type: 'chat', agent: STATE.currentAgent, message: msg });
}

let streamMsgEl = null;
function addMessage(role, content, sender) {
  const el = document.createElement('div'); el.className = 'msg ' + role;
  if (sender && role === 'user') el.innerHTML = '<div class="sender">' + esc(sender) + '</div>' + esc(content);
  else if (role === 'assistant') el.innerHTML = '<div class="sender">' + esc(sender || '') + '</div><div class="content"></div>';
  else el.textContent = content;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
  return el;
}

function addSystemMsg(text) { const el = addMessage('system', text, null); }

function appendStreamChunk(chunk) {
  if (!streamMsgEl) {
    const a = STATE.agents[STATE.currentAgent];
    streamMsgEl = addMessage('assistant', '', a?.emoji || '');
  }
  const c = streamMsgEl.querySelector('.content');
  if (c) { c.textContent += chunk; streamMsgEl.scrollIntoView({ behavior: 'smooth' }); }
}

function renderStatus() {
  document.getElementById('statusGrid').innerHTML = Object.values(STATE.agents).map(a => `
    <div class="status-card">
      <h3>${a.emoji} ${a.display_name} <span style="font-size:12px;color:var(--text-dim)">(${a.name})</span></h3>
      <div class="row"><span class="label">专长</span><span>${a.specialty}</span></div>
      <div class="row"><span class="label">状态</span><span style="color:${a.state === 'idle' ? 'var(--green)' : 'var(--yellow)'}">${a.state}</span></div>
      <div class="row"><span class="label">调用次数</span><span class="highlight">${a.usage?.calls || 0}</span></div>
      <div class="row"><span class="label">Token (输入/输出)</span><span>${(a.usage?.prompt_tokens||0).toLocaleString()} / ${(a.usage?.completion_tokens||0).toLocaleString()}</span></div>
      <div class="row"><span class="label">费用</span><span>$${(a.usage?.cost || 0).toFixed(6)}</span></div>
      <div class="row"><span class="label">激活技能</span><span>${(a.skills||[]).filter(s=>s.active).map(s=>s.name).join(', ') || '—'}</span></div>
    </div>
  `).join('');
}

function renderSkills() {
  const a = STATE.agents[STATE.currentAgent];
  const list = document.getElementById('skillsList');
  if (!a || !a.skills) { list.innerHTML = '<p class="text-dim">选择 Agent 查看技能</p>'; return; }
  list.innerHTML = a.skills.map(s => `
    <div class="skill-item">
      <div class="info">
        <div class="name">${esc(s.name)}</div>
        <div class="desc">${esc(s.description)}</div>
      </div>
      <button class="toggle ${s.active ? 'active' : ''}" onclick="toggleSkill('${s.name}')"></button>
    </div>
  `).join('');
}

function toggleSkill(name) {
  sendWS({ type: 'chat', agent: STATE.currentAgent, message: '/use ' + name });
  setTimeout(fetchStatus, 500);
}

function showTaskPlan(goal, tasks) {
  switchPanel('chat');
  addSystemMsg('📋 任务计划: ' + goal);
  for (const t of tasks) addSystemMsg('  ' + t.id + '. ' + (STATE.agents[t.agent]?.emoji || '❓') + ' ' + t.description);
}

async function fetchStatus() {
  try {
    const r = await fetch('/api/agents'); const agents = await r.json();
    for (const a of agents) STATE.agents[a.name] = a;
    renderStatus(); renderSkills(); renderAgentBar();
  } catch (e) { debug('获取状态失败'); }
}

function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelector('[data-panel="' + name + '"]').classList.add('active');
  if (name === 'status') fetchStatus();
  if (name === 'skills') renderSkills();
}

function debug(msg) {
  const log = document.getElementById('debugLog');
  log.textContent += '\n[' + new Date().toLocaleTimeString() + '] ' + msg;
  log.scrollTop = log.scrollHeight;
}

function esc(str) {
  var div = document.createElement('div'); div.textContent = str; return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', () => { connectWS(); setInterval(fetchStatus, 5000); });
</script>
</body>
</html>
