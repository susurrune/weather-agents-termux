<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Agents — 雾·雨·霜·雪·露</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

        .header { background: linear-gradient(135deg, #1e293b, #334155); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #475569; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .subtitle { font-size: 13px; color: #94a3b8; }

        .agent-bar { display: flex; gap: 8px; padding: 12px 24px; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; }
        .agent-card { flex: 0 0 auto; padding: 10px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; min-width: 140px; text-align: center; }
        .agent-card:hover { transform: translateY(-2px); }
        .agent-card.active { border-color: #38bdf8; }
        .agent-card .emoji { font-size: 28px; }
        .agent-card .name { font-size: 14px; font-weight: 600; margin-top: 4px; }
        .agent-card .specialty { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .agent-card .state { font-size: 11px; margin-top: 4px; padding: 2px 8px; border-radius: 10px; display: inline-block; }
        .state-idle { background: #065f46; color: #6ee7b7; }
        .state-thinking { background: #1e3a5f; color: #7dd3fc; }
        .state-acting { background: #4a1d7a; color: #c084fc; }
        .state-error { background: #7f1d1d; color: #fca5a5; }

        .fog { background: rgba(148,163,184,0.15); }
        .rain { background: rgba(56,189,248,0.15); }
        .frost { background: rgba(165,243,252,0.15); }
        .snow { background: rgba(226,232,240,0.15); }
        .dew { background: rgba(74,222,128,0.15); }

        .main { display: grid; grid-template-columns: 1fr 340px; height: calc(100vh - 140px); }

        .chat-area { display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .msg { margin-bottom: 16px; max-width: 85%; }
        .msg.user { margin-left: auto; }
        .msg.agent { margin-right: auto; }
        .msg.system { margin: 8px auto; text-align: center; }
        .msg.system .msg-bubble { background: transparent; color: #64748b; font-size: 12px; padding: 4px 12px; }
        .msg-bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
        .msg.user .msg-bubble { background: #1d4ed8; color: white; border-bottom-right-radius: 4px; }
        .msg.agent .msg-bubble { background: #334155; border-bottom-left-radius: 4px; }
        .msg .sender { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
        .msg .timestamp { font-size: 11px; color: #64748b; margin-top: 4px; }

        .typing-indicator { display: none; padding: 8px 24px; align-items: center; gap: 8px; color: #7dd3fc; font-size: 13px; background: #1e293b; border-top: 1px solid #334155; }
        .typing-indicator.active { display: flex; }
        .typing-indicator .spinner { width: 14px; height: 14px; border: 2px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .input-area { padding: 12px 24px; border-top: 1px solid #334155; display: flex; gap: 8px; }
        .input-area input { flex: 1; padding: 10px 16px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #38bdf8; }
        .input-area button { padding: 10px 20px; border-radius: 8px; border: none; background: #2563eb; color: white; cursor: pointer; font-size: 14px; font-weight: 500; }
        .input-area button:hover { background: #1d4ed8; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        .sidebar { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .sidebar h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .task-item { background: #1e293b; border-radius: 8px; padding: 12px; border-left: 3px solid #475569; }
        .task-item.done { border-left-color: #22c55e; }
        .task-item.failed { border-left-color: #ef4444; }
        .task-item .task-agent { font-size: 12px; color: #7dd3fc; }
        .task-item .task-desc { font-size: 13px; margin-top: 4px; }
        .task-item .task-status { font-size: 11px; margin-top: 4px; }

        .config-panel { }
        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
        .config-item select { background: #1e293b; color: white; border: 1px solid #475569; border-radius: 4px; padding: 4px 8px; font-size: 12px; }

        .summary-panel { background: #1e293b; border-radius: 8px; padding: 12px; }
        .summary-panel .summary-content { font-size: 13px; line-height: 1.5; color: #cbd5e1; margin-top: 4px; max-height: 200px; overflow-y: auto; }

        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Weather Agents</h1>
            <div class="subtitle">🌫️ 雾 · 🌧️ 雨 · ❄️ 霜 · 🌨️ 雪 · 💧 露</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <span id="sessionId" style="font-size:11px;color:#64748b;"></span>
            <button onclick="refreshAgents()" style="padding:6px 12px;border-radius:6px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;">Refresh</button>
        </div>
    </div>

    <div class="agent-bar" id="agentBar">
        <div class="agent-card fog active" data-agent="fog" onclick="selectAgent('fog')">
            <div class="emoji">🌫️</div>
            <div class="name">雾 Fog</div>
            <div class="specialty">探索研究</div>
            <div class="state state-idle">idle</div>
        </div>
        <div class="agent-card rain" data-agent="rain" onclick="selectAgent('rain')">
            <div class="emoji">🌧️</div>
            <div class="name">雨 Rain</div>
            <div class="specialty">生成创造</div>
            <div class="state state-idle">idle</div>
        </div>
        <div class="agent-card frost" data-agent="frost" onclick="selectAgent('frost')">
            <div class="emoji">❄️</div>
            <div class="name">霜 Frost</div>
            <div class="specialty">审查优化</div>
            <div class="state state-idle">idle</div>
        </div>
        <div class="agent-card snow" data-agent="snow" onclick="selectAgent('snow')">
            <div class="emoji">🌨️</div>
            <div class="name">雪 Snow</div>
            <div class="specialty">规划编排</div>
            <div class="state state-idle">idle</div>
        </div>
        <div class="agent-card dew" data-agent="dew" onclick="selectAgent('dew')">
            <div class="emoji">💧</div>
            <div class="name">露 Dew</div>
            <div class="specialty">运维集成</div>
            <div class="state state-idle">idle</div>
        </div>
    </div>

    <div class="main">
        <div class="chat-area">
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typing">
                <div class="spinner"></div>
                <span id="typingText">思考中...</span>
            </div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
        <div class="sidebar">
            <div>
                <h3>Task Board</h3>
                <div id="taskBoard"><div style="color:#64748b;font-size:13px;">暂无任务</div></div>
            </div>
            <div id="summaryContainer" class="summary-panel" style="display:none;">
                <h3>Summary</h3>
                <div class="summary-content" id="summaryContent"></div>
            </div>
            <div class="config-panel">
                <h3>Config</h3>
                <div class="config-item">
                    <span>Default Model</span>
                    <select id="defaultModel">
                        <option>gpt-4o-mini</option>
                        <option>gpt-4o</option>
                        <option>claude-sonnet-4-6</option>
                        <option>claude-haiku-4-5</option>
                        <option>gpt-4.1</option>
                        <option>gpt-4.1-mini</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAgent = 'fog';
        let ws = null;
        let streamingMsgEl = null;
        let sessionId = '';

        function selectAgent(name) {
            currentAgent = name;
            document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-agent="${name}"]`).classList.add('active');
            const info = getAgentInfo(name);
            document.getElementById('msgInput').placeholder = `与${info.name}对话...`;
        }

        function getAgentInfo(name) {
            const map = {
                fog: { name: '雾', emoji: '🌫️' },
                rain: { name: '雨', emoji: '🌧️' },
                frost: { name: '霜', emoji: '❄️' },
                snow: { name: '雪', emoji: '🌨️' },
                dew: { name: '露', emoji: '💧' },
            };
            return map[name] || { name, emoji: '❓' };
        }

        function addMessage(role, content, agentName, isStreaming) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');

            if (role === 'system') {
                div.className = 'msg system';
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = content;
                div.appendChild(bubble);
            } else {
                div.className = `msg ${role === 'user' ? 'user' : 'agent'}`;
                const sender = document.createElement('div');
                sender.className = 'sender';
                const info = getAgentInfo(agentName);
                sender.textContent = role === 'user' ? 'You' : `${info.emoji} ${info.name}`;
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = content;

                div.appendChild(sender);
                div.appendChild(bubble);

                if (role === 'agent') {
                    const ts = document.createElement('div');
                    ts.className = 'timestamp';
                    ts.textContent = new Date().toLocaleTimeString();
                    div.appendChild(ts);
                }
            }

            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            return bubble;
        }

        function appendStreamingChunk(chunk, agentName) {
            const msgs = document.getElementById('messages');
            let lastMsg = msgs.lastElementChild;

            // Check if last message is a streaming agent message from the same agent
            if (!lastMsg || !lastMsg.classList.contains('msg') || !lastMsg.classList.contains('agent') ||
                (lastMsg.querySelector('.sender')?.textContent !== getAgentInfo(agentName).emoji + ' ' + getAgentInfo(agentName).name)) {
                // Create new message for streaming
                streamingMsgEl = addMessage('agent', chunk, agentName, true);
                return;
            }

            streamingMsgEl = lastMsg.querySelector('.msg-bubble');
            if (streamingMsgEl) {
                streamingMsgEl.textContent += chunk;
                msgs.scrollTop = msgs.scrollHeight;
            }
        }

        function finalizeStreaming() {
            streamingMsgEl = null;
        }

        function setTyping(on, text) {
            const el = document.getElementById('typing');
            el.classList.toggle('active', on);
            if (text) document.getElementById('typingText').textContent = text;
            document.getElementById('sendBtn').disabled = on;
        }

        function updateAgentState(agentName, state) {
            const card = document.querySelector(`[data-agent="${agentName}"]`);
            if (!card) return;
            const stateEl = card.querySelector('.state');
            stateEl.textContent = state;
            stateEl.className = `state state-${state}`;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';

            addMessage('user', msg, currentAgent);

            // Handle /task command via REST
            if (msg.startsWith('/task ')) {
                const goal = msg.slice(6);
                setTyping(true, '正在规划任务...');
                try {
                    const resp = await fetch(`/api/task?session_id=${sessionId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ goal }),
                    });
                    const data = await resp.json();
                    updateTaskBoard(data);
                    if (data.summary) {
                        document.getElementById('summaryContainer').style.display = 'block';
                        document.getElementById('summaryContent').textContent = data.summary;
                    }
                } catch (e) {
                    addMessage('agent', 'Error: ' + e.message, 'snow');
                }
                setTyping(false);
                return;
            }

            // Stream via WebSocket
            setTyping(true, '思考中...');
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'chat',
                    agent: currentAgent,
                    message: msg,
                }));
            } else {
                // Fallback to REST
                try {
                    const resp = await fetch(`/api/agents/${currentAgent}/chat?session_id=${sessionId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: msg }),
                    });
                    const data = await resp.json();
                    addMessage('agent', data.response || 'No response', currentAgent);
                } catch (e) {
                    addMessage('agent', 'Error: ' + e.message, currentAgent);
                }
                setTyping(false);
            }
        }

        function updateTaskBoard(data) {
            const board = document.getElementById('taskBoard');
            if (!data.tasks || data.tasks.length === 0) {
                board.innerHTML = '<div style="color:#64748b;font-size:13px;">暂无任务</div>';
                return;
            }
            board.innerHTML = '';

            // Show task plan
            (data.tasks || []).forEach(t => {
                const info = getAgentInfo(t.agent || 'fog');
                const item = document.createElement('div');
                item.className = 'task-item';
                item.id = `task-${t.id}`;
                item.innerHTML = `<div class="task-agent">${info.emoji} ${info.name}</div><div class="task-desc">${t.description}</div><div class="task-status">⏳ 待执行</div>`;
                board.appendChild(item);
            });

            // Mark results
            if (data.results) {
                data.results.forEach(r => {
                    const item = document.getElementById(`task-${r.id}`);
                    if (item) {
                        item.classList.add(r.success ? 'done' : 'failed');
                        item.querySelector('.task-status').textContent = r.success ? '✅ 完成' : '❌ 失败';
                    }
                });
            }
        }

        async function refreshAgents() {
            try {
                const resp = await fetch(`/api/agents?session_id=${sessionId}`);
                const agents = await resp.json();
                agents.forEach(a => {
                    updateAgentState(a.name, a.state);
                });
            } catch (e) {}
        }

        // WebSocket
        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws`);
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const type = data.type;

                switch (type) {
                    case 'session_ready':
                        sessionId = data.session_id;
                        document.getElementById('sessionId').textContent = `Session: ${sessionId}`;
                        if (data.agents) {
                            data.agents.forEach(a => updateAgentState(a.name, a.state));
                        }
                        break;

                    case 'chat_chunk':
                        setTyping(false);
                        if (data.done) {
                            finalizeStreaming();
                        } else if (data.chunk) {
                            appendStreamingChunk(data.chunk, data.agent);
                        }
                        break;

                    case 'state_change':
                        updateAgentState(data.agent, data.state);
                        if (data.state === 'thinking') {
                            setTyping(true, `${getAgentInfo(data.agent).emoji} ${getAgentInfo(data.agent).name} 思考中...`);
                        } else if (data.state === 'acting') {
                            setTyping(true, `${getAgentInfo(data.agent).emoji} ${getAgentInfo(data.agent).name} 执行工具中...`);
                        } else if (data.state === 'idle') {
                            setTyping(false);
                        } else if (data.state === 'error') {
                            setTyping(false);
                        }
                        break;

                    case 'task_plan':
                        updateTaskBoard(data);
                        break;

                    case 'pong':
                        break;

                    case 'error':
                        addMessage('system', 'Error: ' + data.message, '');
                        setTyping(false);
                        break;
                }
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }
        connectWS();

        // Periodic refresh as fallback
        setInterval(async () => {
            if (sessionId) refreshAgents();
        }, 15000);
    </script>
</body>
</html>
